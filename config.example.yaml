features:
  download_images: true
  video_subtitle: true
  ai_summary: false
scraping:
  backend: auto
  firecrawl:
    api_key: "fc-YOUR_API_KEY_HERE"   # 替换为你的 Firecrawl API Key
    only_main_content: true
    wait_for: 1000
video:
  bilibili: pass
  platforms:
  - bilibili
ai_summary:
  provider: ''
  api_key: ''
  base_url: ''
  model: ''
  prompt_template: '请总结以下视频内容，包括：

    1. 视频核心主题

    2. 关键观点和论据

    3. 值得记住的要点

    4. 一句话总结

    '
limits:
  max_images: 20
  max_content_chars: 50000
  image_timeout: 10
  page_fetch_timeout: 20
screenshot:
  enabled: true
  engine: auto            # auto=playwright优先firecrawl回退; playwright; firecrawl; off
  timeout: 30
  user_agent: ""          # 留空用 playwright 默认
unsupported_image_domains:
- zhstatic
- zhihu.com
- weixin
- mmbiz
- qpic.cn
- bing.com
- googleusercontent.com
- fbcdn.net
