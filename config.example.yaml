features:
  download_images: true
  video_subtitle: true
  ai_summary: false
scraping:
  backend: auto
  firecrawl:
    api_key: "fc-YOUR_API_KEY_HERE"   # 替换为你的 Firecrawl API Key
    only_main_content: true
    wait_for: 1000
video:
  bilibili: pass
  platforms:
  - bilibili
asr:
  enabled: false                      # 总开关；false=无字幕直接标部分失败(保持旧行为)
  keep_audio: false                   # 是否保留下载的音频(m4a)；默认转写后删除省空间
  keep_transcript: true               # 是否单独存 transcript.txt(照存ASR文本)
  audio_dir: ''                       # 音频临时目录；空=用条目目录
  fallback_chain:                     # 回退顺序，可删减
  - videocaptioner:bijian
  - videocaptioner:jianying
  - volcengine
  videocaptioner:
    binary: videocaptioner            # CLI 路径(pipx 装的可填全路径)
    language: auto                    # auto/zh/en/ja...；bijian/jianying 仅中英文
    timeout: 600                      # 单次转写超时(秒)
  volcengine:
    appid: ''                         # 火山控制台获取
    token: ''                         # 同上(填到鉴权头 Bearer; {token})
    cluster: ''                       # 豆包2.0对应 Cluster ID
    language: zh-CN
    poll_interval: 5
    poll_timeout: 600
    audio_url:
      method: ''                      # local_http | tos | tunnel；空=火山禁用
      local_http:
        public_base: ''               # 公网可达基址,如 http://1.2.3.4:8765
        port: 8765
      tos:
        access_key: ''
        secret_key: ''
        endpoint: tos-cn-beijing.volces.com
        region: cn-beijing
        bucket: ''
        prefix: glean-asr/
        expire_seconds: 3600
      tunnel:
        binary: cloudflared            # cloudflared 路径
ai_summary:
  provider: ''
  api_key: ''
  base_url: ''
  model: ''
  prompt_template: '请总结以下视频内容，包括：

    1. 视频核心主题

    2. 关键观点和论据

    3. 值得记住的要点

    4. 一句话总结

    '
limits:
  max_images: 20
  max_content_chars: 50000
  image_timeout: 10
  page_fetch_timeout: 20
  max_file_size_mb: 20          # FR-013b: 单文件大小上限(MB)
  max_video_duration_min: 15    # FR-013b: 视频时长上限(分钟)
screenshot:
  enabled: true
  engine: auto            # auto=playwright优先firecrawl回退; playwright; firecrawl; off
  timeout: 30
  user_agent: ""          # 留空用 playwright 默认
  full_page: true         # T023: 整页长截图(全页 vs 首屏)
  store_screenshot: true  # T024: 是否保存截图文件到磁盘
unsupported_image_domains:
- zhstatic
- zhihu.com
- weixin
- mmbiz
- qpic.cn
- bing.com
- googleusercontent.com
- fbcdn.net
